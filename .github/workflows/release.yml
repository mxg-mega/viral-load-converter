name: Release Build

# Triggers only on version tags (e.g. v1.0.0) pushed to master.
# Builds Windows installer + Linux AppImage in parallel, then publishes
# both as a GitHub Release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.*

      - name: Build with PyInstaller
        run: pyinstaller viral_load_calculator.spec --noconfirm --clean

      - name: Verify dist output
        shell: bash
        run: |
          if [ ! -f "dist/ViralLoadCalculator/ViralLoadCalculator.exe" ]; then
            echo "ERROR: PyInstaller did not produce dist/ViralLoadCalculator/ViralLoadCalculator.exe"
            ls -la dist/ || true
            exit 1
          fi

      - name: Compile Inno Setup installer
        uses: Minionguyenpro/iscc-action@master
        with:
          iss-file: viral_load_calculator.iss

      - name: Verify installer
        shell: bash
        run: |
          if [ ! -f "installer/ViralLoadCalculator_Setup.exe" ]; then
            echo "ERROR: Inno Setup did not produce installer/ViralLoadCalculator_Setup.exe"
            exit 1
          fi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/ViralLoadCalculator_Setup.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            fuse libfuse2 wget file

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.*

      - name: Build with PyInstaller
        run: pyinstaller viral_load_calculator.spec --noconfirm --clean

      - name: Build AppImage
        run: chmod +x tools/build_appimage.sh && ./tools/build_appimage.sh

      - name: Verify AppImage
        run: |
          if [ ! -f "ViralLoadCalculator-x86_64.AppImage" ]; then
            echo "ERROR: AppImage was not produced"
            ls -la *.AppImage 2>/dev/null || true
            exit 1
          fi
          file ViralLoadCalculator-x86_64.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ViralLoadCalculator-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/windows-installer

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release-assets/linux-appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/windows-installer/ViralLoadCalculator_Setup.exe
            release-assets/linux-appimage/ViralLoadCalculator-x86_64.AppImage
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
