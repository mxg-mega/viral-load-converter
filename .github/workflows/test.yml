name: CI (Test)

# Validation pipeline. Runs on every push to `test` and on PRs into
# `master`. Builds both platforms but does NOT publish a release.
# This is the gating pipeline before merging improvements to master.

on:
  push:
    branches: [test]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & import check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check
        run: python -m compileall -q main.py models config.py

      - name: Import-check (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -c "import main; print('main.py imports OK')"

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            fuse libfuse2 wget file

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.*

      - name: Build with PyInstaller
        run: pyinstaller viral_load_calculator.spec --noconfirm --clean

      - name: Build AppImage
        run: chmod +x tools/build_appimage.sh && ./tools/build_appimage.sh

      - name: Upload Linux AppImage (build only, no release)
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ViralLoadCalculator-x86_64.AppImage
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.* pillow

      - name: Generate Windows .ico
        run: python tools/build_icon.py

      - name: Build with PyInstaller
        run: pyinstaller viral_load_calculator.spec --noconfirm --clean

      - name: Compile Inno Setup installer
        uses: Minionguyenpro/iscc-action@v1
        with:
          iss-file: viral_load_calculator.iss

      - name: Upload Windows installer (build only, no release)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/ViralLoadCalculator_Setup.exe
          if-no-files-found: error
